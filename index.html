<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday MELOPHILE!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; /* Deep dark blue background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #334155;
            position: relative;
            z-index: 1;
        }
        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }
        h1 {
            margin: 10px 0;
            color: #38bdf8;
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .nickname {
            font-size: 1.3em;
            color: #fbbf24;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }
        .date {
            background: #38bdf8;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #0f172a;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .message {
            line-height: 1.6;
            color: #cbd5e1;
            margin: 20px 0;
            font-size: 1.1em;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #94a3b8;
        }
        .sender-name {
            color: #f8fafc;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            font-size: 1.1em;
        }
        /* Simple floating animation for the card */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .card {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="date">JULY 29, 2026</div>
        
        <img src="2855.jpg" alt="Saloni Nandurkar" class="profile-img">
        
        <h1>Happy Birthday!</h1>
        <span class="nickname">MELOPHILE 🧿🍁</span>
        
        <p class="message">
            To the most wonderful person, <strong>Saloni Nandurkar</strong>. 
            May your day be as beautiful and special as you are. Keep shining!
        </p>

        <div class="footer">
            Wishing you all the happiness,
            <span class="sender-name">Harshank Bramhankar</span>
        </div>
    </div>

</body>
</html>
